# ============================================================
# Secure Online Examination System — Configuration
# ============================================================

# Database
db.url=jdbc:mysql://localhost:3306/exam_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=root
db.password=Nittu@123
db.pool.size=10
db.pool.min.idle=2
db.pool.connection.timeout=30000
db.pool.idle.timeout=600000
db.pool.max.lifetime=1800000

# OpenCV native library path (adjust for your OS)
# Windows: C:/opencv/build/java/x64
# Linux/macOS: /usr/local/lib
opencv.lib.path=C:/opencv/build/java/x64

# Proctoring
proctor.frame.interval.ms=5000
proctor.save.dir=C:/tmp/proctor
proctor.gaze.deviation.threshold=0.30
proctor.critical.auto.submit.count=3

# Session
session.timeout.minutes=120

# Application
app.name=ExamPortal
app.version=1.0.0
